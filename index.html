<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brahmastra Scanner | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0f19;
            --card-bg: #111827;
            --border-color: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 1.5rem;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo h1 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .logo p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .stats-badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            padding: 0.4rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.2);
            white-space: nowrap;
        }

        .btn-export {
            background-color: var(--accent-blue);
            color: #ffffff;
            padding: 0.45rem 0.9rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .btn-export:hover {
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box, .filter-select, .date-picker {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem 0.85rem;
            border-radius: 0.5rem;
            outline: none;
            font-size: 0.825rem;
        }

        .search-box {
            flex: 1 1 200px;
            min-width: 180px;
        }

        .date-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            font-size: 0.825rem;
        }

        .table-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            overflow-x: auto;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.85rem;
            min-width: 800px;
        }

        th {
            background-color: rgba(31, 41, 55, 0.5);
            color: var(--text-muted);
            font-weight: 600;
            padding: 0.85rem 1rem;
            text-transform: uppercase;
            font-size: 0.725rem;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.45rem;
            border-radius: 0.375rem;
            font-size: 0.725rem;
            font-weight: 600;
        }

        .badge-breakout {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-breakdown {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-chart {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            padding: 0.35rem 0.65rem;
            border-radius: 0.375rem;
            text-decoration: none;
            font-size: 0.725rem;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: all 0.2s;
        }

        .btn-chart:hover {
            background-color: var(--accent-blue);
            color: #ffffff;
        }

        .empty-state {
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <span style="font-size: 1.5rem;">🚀</span>
            <div>
                <h1>BRAHMASTRA SCANNER</h1>
                <p>NSE F&O Pre-Breakout Watchlist & Signal Terminal</p>
            </div>
        </div>
        <div class="header-actions">
            <div class="stats-badge" id="signalCount">Loading...</div>
            <button class="btn-export" id="exportBtn">📥 Export CSV</button>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="Search Symbol (e.g. RELIANCE, TITAN)...">
        
        <div class="date-picker-wrapper">
            <span>Date:</span>
            <input type="date" id="dateFilter" class="date-picker">
        </div>

        <select id="patternFilter" class="filter-select">
            <option value="ALL">All Patterns</option>
            <option value="PRE_BREAKOUT">PRE_BREAKOUT</option>
            <option value="PRE_BREAKDOWN">PRE_BREAKDOWN</option>
        </select>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Symbol</th>
                    <th>Pattern</th>
                    <th>Trigger Entry</th>
                    <th>Stop Loss</th>
                    <th>Target (3x)</th>
                    <th>20 EMA</th>
                    <th>14 ADX</th>
                    <th>Chart</th>
                </tr>
            </thead>
            <tbody id="signalsTableBody">
                <tr>
                    <td colspan="9" class="empty-state">Loading latest market data...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        let allData = [];
        let filteredData = [];

        fetch('data/signals.csv')
            .then(response => {
                if (!response.ok) {
                    throw new Error('CSV file not found');
                }
                return response.text();
            })
            .then(csvText => {
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        allData = results.data;
                        filteredData = allData;
                        document.getElementById('signalCount').innerText = `${allData.length} Total Signals`;
                        renderTable(allData);
                    }
                });
            })
            .catch(error => {
                console.error('Error fetching CSV:', error);
                document.getElementById('signalsTableBody').innerHTML = `
                    <tr>
                        <td colspan="9" class="empty-state">⚠️ No signals found in history or scanner hasn't executed yet.</td>
                    </tr>
                `;
                document.getElementById('signalCount').innerText = `0 Signals`;
            });

        function renderTable(data) {
            const tbody = document.getElementById('signalsTableBody');
            tbody.innerHTML = '';

            if (!data || data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9" class="empty-state">No matching signals found.</td>
                    </tr>
                `;
                return;
            }

            data.forEach(row => {
                const date = row.date || row.Date || 'N/A';
                const symbol = row.symbol || row.Symbol || 'N/A';
                const pattern = row.pattern || row.type || row.Type || row.Pattern || 'PRE_BREAKOUT';
                const entry = parseFloat(row.entry || row.Entry || 0).toFixed(2);
                const sl = parseFloat(row.sl || row.SL || 0).toFixed(2);
                const target = parseFloat(row.target || row.Target || 0).toFixed(2);
                const ema = parseFloat(row.ema || row.EMA || 0).toFixed(2);
                const adx = parseFloat(row.adx || row.ADX || 0).toFixed(2);

                const badgeClass = pattern.includes('BREAKOUT') ? 'badge-breakout' : 'badge-breakdown';
                const tvUrl = `https://in.tradingview.com/chart/?symbol=NSE:${symbol}`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${date}</td>
                    <td><strong>${symbol}</strong></td>
                    <td><span class="badge ${badgeClass}">${pattern}</span></td>
                    <td>₹${entry}</td>
                    <td>₹${sl}</td>
                    <td>₹${target}</td>
                    <td>₹${ema}</td>
                    <td>${adx}</td>
                    <td><a href="${tvUrl}" target="_blank" class="btn-chart">Chart ↗</a></td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('dateFilter').addEventListener('change', filterData);
        document.getElementById('patternFilter').addEventListener('change', filterData);

        function filterData() {
            const searchVal = document.getElementById('searchInput').value.toUpperCase();
            const patternVal = document.getElementById('patternFilter').value;
            const dateVal = document.getElementById('dateFilter').value;

            let formattedSearchDate = '';
            if (dateVal) {
                const parts = dateVal.split('-');
                formattedSearchDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
            }

            filteredData = allData.filter(row => {
                const symbol = (row.symbol || row.Symbol || '').toUpperCase();
                const pattern = (row.pattern || row.type || row.Type || '').toUpperCase();
                const rowDate = (row.date || row.Date || '');

                const matchesSearch = symbol.includes(searchVal);
                const matchesPattern = patternVal === 'ALL' || pattern.includes(patternVal);
                const matchesDate = !formattedSearchDate || rowDate === formattedSearchDate;

                return matchesSearch && matchesPattern && matchesDate;
            });

            renderTable(filteredData);
        }

        document.getElementById('exportBtn').addEventListener('click', () => {
            if (!filteredData || filteredData.length === 0) {
                alert('No data available to export.');
                return;
            }

            const csv = Papa.unparse(filteredData);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.setAttribute('href', url);
            link.setAttribute('download', 'brahmastra_signals.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
